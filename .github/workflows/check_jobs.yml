name: Job Monitor

on:
  schedule:
    # Runs daily at 9 AM UTC (4 AM ET / 1 AM PT)
    - cron: "0 9 * * *"
  workflow_dispatch: # allow manual runs from the GitHub UI

permissions:
  contents: write # needed to commit the updated seen_jobs.json

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r job-monitor/requirements.txt
        working-directory: ${{ github.workspace }}

      - name: Run job monitor
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL: ngardone@gmail.com
        run: python job-monitor/check_jobs.py | tee /tmp/job_monitor_output.txt
        working-directory: ${{ github.workspace }}

      - name: Write run summary
        if: always()
        run: |
          echo "## Job Monitor — $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat /tmp/job_monitor_output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Commit updated seen_jobs.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add job-monitor/seen_jobs.json
          # Only commit if the file actually changed
          git diff --staged --quiet || git commit -m "chore: update seen_jobs.json [skip ci]"
          git push
